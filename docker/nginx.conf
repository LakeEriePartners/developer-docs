worker_processes auto;
pid /tmp/nginx.pid;

# Send fatal errors to stderr so they land in container logs.
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs go to stdout/stderr for container log aggregation.
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$http_x_request_id"'
        '}';
    access_log /dev/stdout json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # When nginx emits its own 301 (trailing-slash inference,
    # try_files chain, etc.), use a relative Location header so the
    # redirect works regardless of the host/port the ingress is
    # terminating on. Without this, `Location:` carries
    # `http://127.0.0.1:8080/...` which is wrong behind any proxy.
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ──────────────────────────────────────────────────────────────────
    # Legacy URL → new URL map.
    #
    # Source URLs are the Sphinx site that lived at
    # developers.tpastream.com until this cutover. Anchors (#…) are
    # browser-side and can't be matched here; we handle anchor-only
    # fall-through via a Docusaurus client module
    # (src/clientModules/legacy-anchor-redirects.ts) loaded on every
    # page. The map below covers path-level cases.
    # ──────────────────────────────────────────────────────────────────
    map $uri $legacy_redirect {
        default                            "";
        /index.html                        /;

        # Sphinx generated /api.html, /connect.html, /getting_started.html.
        /api.html                          /api/overview;
        /connect.html                      /connect/overview;
        /getting_started.html              /getting-started;

        # Sphinx search → just go to the new index (we have our own
        # search in the navbar).
        /search.html                       /;
        /genindex.html                     /;
        /py-modindex.html                  /;

        # _static and _sources are Sphinx-build artifacts; redirect to
        # the new image location for the few that are commonly hotlinked,
        # otherwise to root.
        ~^/_static/.*$                     /;
        ~^/_sources/.*$                    /;
    }

    server {
        listen 8080 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Lets the marketing-site / ingress healthcheck pattern apply
        # unchanged (see modules/k8s-infrastructure/modules/marketing-site).
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Apply the legacy 301 redirect map first; only matches when
        # the source path is in the map above.
        if ($legacy_redirect != "") {
            return 301 $legacy_redirect;
        }

        # Long-cache static asset hashes Docusaurus emits with content hashes.
        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Docusaurus emits .html files for every route; use clean-URL
        # fall-through so /api/overview serves /api/overview/index.html.
        location / {
            try_files $uri $uri/ $uri.html $uri/index.html =404;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
